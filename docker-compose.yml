services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: logger
      POSTGRES_USER: logger
      POSTGRES_PASSWORD: logger
    volumes:
      - db_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U logger -d logger"]
      interval: 3s
      timeout: 3s
      retries: 30

  tracker:
    build:
      context: .
      dockerfile: services/tracker/Dockerfile
    environment:
      DATABASE_URL: postgresql+psycopg2://logger:logger@db:5432/logger
    depends_on:
      db:
        condition: service_healthy
    restart: on-failure
    ports:
      - "8000:8000"

  admin:
    build:
      context: .
      dockerfile: services/admin/Dockerfile
    environment:
      DATABASE_URL: postgresql+psycopg2://logger:logger@db:5432/logger
      PUBLIC_TRACKER_URL: http://localhost:8000
    depends_on:
      db:
        condition: service_healthy
    restart: on-failure
    ports:
      - "8001:8001"

  frontend:
    build:
      context: .
      dockerfile: services/frontend/Dockerfile
    depends_on:
      - admin
    ports:
      - "8080:80"

volumes:
  db_data: